<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따뜻한 한식당</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #fff8ef;
    font-family: 'Noto Sans KR', sans-serif;
    color: #3e2a20;
}

/* 헤더 강조 */
header {
    text-align: center;
    padding: 70px 20px;
    background: linear-gradient(135deg, #c97a40, #7a4b2c);
    color: white;
}

header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 52px;
    margin: 0;
}

header p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

/* 섹션 구분 강화 */
section {
    padding: 60px 20px;
    text-align: center;
}

section:nth-child(odd) {
    background-color: #fff3e6;
}

section:nth-child(even) {
    background-color: #fff8ef;
}

/* 카드 컨테이너 */
.menu-container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* 카드 입체감 + 애니메이션 */
.card {
    background: #fff;
    border-radius: 18px;
    width: 230px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transform: translateY(30px);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.4s; }
.card:nth-child(3) { animation-delay: 0.6s; }

@keyframes fadeUp {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

.card h3 {
    font-family: 'Noto Serif KR', serif;
}

.price {
    font-weight: bold;
    color: #a65a2e;
    margin-top: 8px;
}

/* 버튼 */
button {
    margin-top: 12px;
    padding: 10px 20px;
    border: 2px solid #5c3a21;
    border-radius: 24px;
    background-color: #5c3a21;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* hover + 클릭 유도 */
button:hover {
    background-color: white;
    color: #5c3a21;
    transform: scale(1.1);
}

button:active {
    transform: scale(0.95);
}

/* 인사말 */
.message-box {
    background-color: #ffe8d6;
    border-radius: 16px;
    padding: 25px;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* 푸터 */
footer {
    background-color: #5c3a21;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>🍲 따뜻한 밥상집</h1>
    <p>한 그릇의 정성으로 마음까지 따뜻하게</p>
</header>

<main>

<section>
    <h2 style="font-family:'Noto Serif KR', serif;">대표 메뉴</h2>

    <div class="menu-container">

        <article class="card">
            <div style="font-size:40px;">🍲</div>
            <h3>콩나물 국밥</h3>
            <p>시원하고 담백한 국물</p>
            <div class="price">₩8,000</div>
            <button>주문하기</button>
        </article>

        <article class="card">
            <div style="font-size:40px;">🍖</div>
            <h3>뼈해장국</h3>
            <p>진하고 깊은 국물</p>
            <div class="price">₩10,000</div>
            <button>주문하기</button>
        </article>

        <article class="card">
            <div style="font-size:40px;">🍜</div>
            <h3>순대국밥</h3>
            <p>든든한 한 끼</p>
            <div class="price">₩9,000</div>
            <button>주문하기</button>
        </article>

    </div>
</section>

<section>
    <h2 style="font-family:'Noto Serif KR', serif;">사장님 한마디</h2>
    <div class="message-box">
        정성을 담아 매일 끓이는 국밥 한 그릇.<br>
        따뜻한 한 끼를 드릴 수 있도록 노력하겠습니다.
    </div>
</section>

</main>

<footer>
    📍 주소: 대구광역시 동구 동부로 121<br>
    ⏰ 영업시간: 매일 08:00 ~ 22:00<br>
    ☎ 전화번호: 010-1234-5678<br>
    👩‍🍳 제작: 김소연
</footer>

</body>
</html>
